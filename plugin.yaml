version: 0.1
lint:
  ignore:
    - linters: [markdownlint]
      paths:
        - .github/copilot-instructions.md
        - .github/docs/**
        - .github/instructions/**
        - .github/prompts/**
    - linters: [stylua]
      paths:
        - "**/locale/*"
  enabled:
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.5.1
    - checkov@3.3.1
    - git-diff-check
    - isort@8.0.1
    - markdownlint@0.49.0
    - osv-scanner@2.4.0
    - oxipng@10.1.1
    - pinact@4.1.0
    - prettier@3.8.4
    - ruff@0.15.18
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - stylua@2.5.2
    - taplo@0.10.0
    - trufflehog@3.95.6
    - yamllint@1.38.0
  exported_configs:
    - configs:
        - configs/.markdownlint.yaml
        - configs/.yamllint.yaml
        - configs/stylua.toml
        - configs/ruff.toml
        - configs/.isort.cfg
